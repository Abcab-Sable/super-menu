# Keeps dependencies patched automatically. Dependabot opens PRs when a newer
# (or security-fixed) version is available. See:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # Python dependencies declared in pyproject.toml / uv.lock (uv-managed repo)
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"

  # GitHub Actions used in any workflow under .github/workflows/
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
